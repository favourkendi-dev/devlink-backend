name: Backend Tests

# Run this workflow every time code is pushed or a PR is opened
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install pipenv
      - name: Install pipenv
        run: pip install pipenv

      # Step 4: Install our project dependencies using Pipfile.lock
      - name: Install dependencies
        run: pipenv install --deploy --ignore-pipfile

      # Step 5: Run Django's test suite
      - name: Run tests
        run: pipenv run python manage.py test
